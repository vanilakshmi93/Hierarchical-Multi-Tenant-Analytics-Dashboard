services:
  - type: web_service
    name: hierarchical-analytics-backend
    env: docker
    branch: main
    dockerfilePath: backend/Dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        value: "super_secret_jwt_key"
      - key: CORS_ORIGIN
        value: "https://hierarchical-analytics-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: analytics-db
          property: connectionString

staticSites:
  - type: static_site
    name: hierarchical-analytics-frontend
    env: node
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://hierarchical-analytics-backend.onrender.com/api"

databases:
  - name: analytics-db
    plan: starter
